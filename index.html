<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Study Guide</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

h1{
font-size:40px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
background:#334155;
}

a{
color:#38bdf8;
text-decoration:none;
font-weight:bold;
}
</style>

</head>

<body>

<h1>📚 Meu Study Guide</h1>
<p>Guia de estudo rápido</p>

<div class="container">

<div class="card">
<h2>Matemática</h2>
<a href="#">Estudar</a>
</div>

<div class="card">
<h2>Programação</h2>
<a href="#">Estudar</a>
</div>

<div class="card">
<h2>História</h2>
<a href="#">Estudar</a>
</div>

<div class="card">
<h2>Ciência</h2>
<a href="#">Estudar</a>
</div>

</div>

</body>
</html>
