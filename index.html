<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Guia de Estudos</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
background:#060810;
font-family:'DM Sans',sans-serif;
color:#e2e8f0;
margin:0;
}

.header{
padding:20px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-family:'Syne';
font-weight:800;
font-size:22px;
}

.main{
display:flex;
max-width:1100px;
margin:auto;
}

.sidebar{
width:200px;
border-right:1px solid #1e293b;
padding:20px;
}

.subj-btn{
display:block;
width:100%;
margin-bottom:6px;
padding:10px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
cursor:pointer;
}

.subj-btn:hover{
background:#1e293b;
}

.content{
flex:1;
padding:30px;
}

.hero{
border-radius:16px;
padding:20px;
margin-bottom:20px;
background:#0f172a;
border:1px solid #1e293b;
}

.hero h2{
font-family:'Syne';
margin:0;
}

.tabs{
display:flex;
gap:6px;
margin-bottom:20px;
}

.tab{
padding:8px 14px;
background:#0f172a;
border-radius:8px;
cursor:pointer;
}

.tab.active{
background:#1e293b;
}

.unit{
background:#0f172a;
border-radius:12px;
margin-bottom:10px;
border:1px solid #1e293b;
}

.unit-header{
padding:12px;
cursor:pointer;
font-weight:600;
}

.topics{
padding:10px 20px;
display:none;
}

.topic{
margin-bottom:6px;
cursor:pointer;
}

.checked{
text-decoration:line-through;
color:#475569;
}

</style>
</head>


<body>

<div class="header">
<div>
<div class="title">📚 Guia de Estudos</div>
<div>1° Semestre · Turno Nocturno</div>
</div>
<div id="progress">0%</div>
</div>

<div class="main">

<div class="sidebar" id="subjects"></div>

<div class="content">

<div class="hero">
<h2 id="subjName"></h2>
<p id="subjDesc"></p>
</div>

<div class="tabs">
<div class="tab active" onclick="setTab('conteudo')">📚 Conteúdo</div>
<div class="tab" onclick="setTab('dicas')">💡 Dicas</div>
<div class="tab" onclick="setTab('recursos')">🔗 Recursos</div>
</div>

<div id="content"></div>

</div>
</div>


<script>

const subjects = [
{
name:"Principios de Programación",
desc:"Base de toda programação.",
units:[
{
title:"Introdução à Programação",
topics:[
"O que é algoritmo",
"Variáveis",
"Entrada e saída"
]
},
{
title:"Loops",
topics:[
"while",
"for",
"break"
]
}
],
tips:[
"Pratique todos os dias",
"Não copie código"
],
resources:[
"CS50 Harvard",
"Exercism"
]
},

{
name:"Matemática Discreta",
desc:"Base matemática da computação.",
units:[
{
title:"Lógica",
topics:[
"Proposições",
"Tabela verdade",
"Leis de De Morgan"
]
}
],
tips:[
"Resolva exercícios",
"Use diagramas"
],
resources:[
"Brilliant",
"MIT OCW"
]
}
]

let active=0
let tab="conteudo"
let checked={}

function renderSubjects(){

let html=""

subjects.forEach((s,i)=>{
html+=`<button class="subj-btn" onclick="setSubject(${i})">${s.name}</button>`
})

document.getElementById("subjects").innerHTML=html
}

function setSubject(i){
active=i
render()
}

function setTab(t){
tab=t
render()
}

function toggleTopic(key){
checked[key]=!checked[key]
render()
}

function render(){

const subj=subjects[active]

document.getElementById("subjName").innerText=subj.name
document.getElementById("subjDesc").innerText=subj.desc

let html=""

if(tab==="conteudo"){

subj.units.forEach((u,ui)=>{

html+=`<div class="unit">
<div class="unit-header">${u.title}</div>
<div class="topics">`

u.topics.forEach((t,ti)=>{

const key=`${active}-${ui}-${ti}`
const done=checked[key]

html+=`<div class="topic ${done?'checked':''}" onclick="toggleTopic('${key}')">
${t}
</div>`

})

html+="</div></div>"

})

}

if(tab==="dicas"){

subj.tips.forEach(t=>{
html+=`<div class="unit"><div class="unit-header">${t}</div></div>`
})

}

if(tab==="recursos"){

subj.resources.forEach(r=>{
html+=`<div class="unit"><div class="unit-header">${r}</div></div>`
})

}

document.getElementById("content").innerHTML=html

}

renderSubjects()
render()

</script>

</body>
</html>
