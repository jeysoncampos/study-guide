<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Guia de Estudos</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{
margin:0;
background:#060810;
color:white;
font-family:Arial;
}
</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const { useState } = React;

const SUBJECTS = [
{
key:"PP",
emoji:"💻",
name:"Principios de Programación",
hours:8,
units:[
{
title:"Introdução à Programação",
topics:[
"Algoritmos",
"Variáveis",
"Entrada e saída"
]
},
{
title:"Estruturas de Controle",
topics:[
"if / else",
"switch",
"operadores lógicos"
]
}
]
},
{
key:"MDL1",
emoji:"🔢",
name:"Matemática Discreta",
hours:6,
units:[
{
title:"Lógica",
topics:[
"proposições",
"tabelas verdade",
"leis de De Morgan"
]
}
]
}
]

function App(){

const [active,setActive]=useState(0)
const [checked,setChecked]=useState({})

const subj=SUBJECTS[active]

function toggle(key){
setChecked({...checked,[key]:!checked[key]})
}

return(

<div style={{padding:"40px"}}>

<h1>📚 Guia de Estudos</h1>

<div style={{display:"flex",gap:"20px",marginBottom:"30px"}}>

{SUBJECTS.map((s,i)=>(

<button
key={i}
onClick={()=>setActive(i)}
style={{
padding:"10px 20px",
background:i===active?"#2563eb":"#1e293b",
color:"white",
border:"none",
borderRadius:"6px",
cursor:"pointer"
}}
>
{s.emoji} {s.key}
</button>

))}

</div>

<h2>{subj.name}</h2>

{subj.units.map((unit,ui)=>(

<div key={ui} style={{marginTop:"20px"}}>

<h3>{unit.title}</h3>

{unit.topics.map((topic,ti)=>{

const key=`${active}-${ui}-${ti}`
const done=checked[key]

return(

<div
key={ti}
onClick={()=>toggle(key)}
style={{
cursor:"pointer",
padding:"6px",
textDecoration:done?"line-through":"none"
}}
>

<input type="checkbox" checked={done||false} readOnly/>
{" "}
{topic}

</div>

)

})}

</div>

))}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
